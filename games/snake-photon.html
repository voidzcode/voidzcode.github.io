<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Snake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #1a1a2e;
            margin-bottom: 8px;
            font-size: 2em;
            font-weight: 600;
        }

        .connection-status {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
            margin-top: 10px;
        }

        .connection-status.connected {
            background: #10b981;
            color: white;
        }

        .connection-status.disconnected {
            background: #ef4444;
            color: white;
        }

        .connection-status.connecting {
            background: #f59e0b;
            color: white;
        }

        .game-wrapper {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        #gameCanvas {
            border: 3px solid #1a1a2e;
            border-radius: 8px;
            background: #0f0f1e;
            flex: 1;
            min-width: 300px;
            max-width: 400px;
            height: auto;
            aspect-ratio: 1;
        }

        .sidebar {
            flex: 1;
            min-width: 250px;
        }

        .join-section {
            background: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            margin-bottom: 20px;
        }

        .join-section h2 {
            margin-bottom: 15px;
            color: #1a1a2e;
            font-size: 1.1em;
            font-weight: 600;
        }

        .join-section input, .join-section select {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.95em;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .join-section input:focus, .join-section select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .join-section button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .join-section button:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .join-section button:active:not(:disabled) {
            transform: translateY(0);
        }

        .join-section button:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            transform: none;
        }

        .game-info {
            background: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            display: none;
        }

        .game-info h2 {
            color: #1a1a2e;
            margin-bottom: 15px;
            font-size: 1.1em;
            font-weight: 600;
        }

        .game-info h3 {
            color: #374151;
            margin-top: 15px;
            margin-bottom: 10px;
            font-size: 0.95em;
            font-weight: 600;
        }

        #playersList, #scoresList {
            background: white;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9em;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
        }

        .player-item, .score-item {
            padding: 8px 0;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-item:last-child, .score-item:last-child {
            border-bottom: none;
        }

        .player-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            display: inline-block;
            flex-shrink: 0;
        }

        .controls {
            text-align: center;
        }

        .controls p {
            color: #6b7280;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .arrow-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .arrow-btn {
            width: 48px;
            height: 48px;
            font-size: 1.3em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            font-family: inherit;
        }

        .arrow-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .arrow-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .arrow-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #991b1b;
            font-weight: 500;
            margin-top: 10px;
            padding: 10px 12px;
            background: #fee2e2;
            border-radius: 6px;
            border: 1px solid #fecaca;
            display: none;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.6em;
            }

            .game-wrapper {
                flex-direction: column;
            }

            #gameCanvas {
                max-width: 100%;
            }

            .arrow-buttons {
                justify-content: center;
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
            }

            .arrow-btn {
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Multiplayer Snake</h1>
            <div class="connection-status" id="status">Initializing...</div>
            <div class="error-message" id="errorMsg"></div>
        </div>

        <div class="game-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>

            <div class="sidebar">
                <div class="join-section" id="joinSection">
                    <h2>Join Game</h2>
                    <input type="text" id="playerName" placeholder="Your name" maxlength="15">
                    <select id="roomSelect">
                        <option value="room1">Room 1</option>
                        <option value="room2">Room 2</option>
                        <option value="room3">Room 3</option>
                    </select>
                    <button id="joinBtn" onclick="joinGame()" disabled>Join Game</button>
                </div>

                <div class="game-info" id="gameInfo">
                    <h2>Players</h2>
                    <div id="playersList"></div>
                    <div class="scores">
                        <h3>Scores</h3>
                        <div id="scoresList"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <p>Use Arrow Keys or WASD to move</p>
            <div class="arrow-buttons">
                <button class="arrow-btn" id="upBtn" onclick="sendDirection(0, -1)" disabled>Up</button>
                <div style="display: flex; gap: 8px;">
                    <button class="arrow-btn" id="leftBtn" onclick="sendDirection(-1, 0)" disabled>Left</button>
                    <button class="arrow-btn" id="downBtn" onclick="sendDirection(0, 1)" disabled>Down</button>
                    <button class="arrow-btn" id="rightBtn" onclick="sendDirection(1, 0)" disabled>Right</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Photon Library -->
    <script src="https://cdn1.exitgames.com/en/resources/photonweb/lib/photon-core-sdk.js"></script>
    <script src="https://cdn1.exitgames.com/en/resources/photonweb/lib/photonloadbalancing-sdk.js"></script>

    <script>
        const GRID_SIZE = 20;
        const CELL_SIZE = 400 / GRID_SIZE;
        const TICK_RATE = 100;
        const APP_ID = '97c15b70-b8e2-4b44-8d80-4c78dbfae2ca';

        let canvas, ctx;
        let gameState = { snakes: {}, food: null, tick: 0 };
        let myPlayerId = null;
        let myRoom = null;
        let mySnake = null;
        let lastDirectionSendTime = 0;
        const DIRECTION_THROTTLE = 50;

        let photon = null;
        let isConnected = false;
        let isInRoom = false;

        window.addEventListener('DOMContentLoaded', () => {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            render();
            initPhoton();
            setupKeyboardControls();
            setupTouchControls();
        });

        function initPhoton() {
            try {
                photon = new Photon.LoadBalancing.LoadBalancingClient(
                    Photon.ConnectionProtocol.Wss,
                    APP_ID,
                    '1.0'
                );

                photon.onConnect = onPhotonConnect;
                photon.onDisconnect = onPhotonDisconnect;
                photon.onError = onPhotonError;
                photon.onEvent = onPhotonEvent;

                updateStatus('Connecting...', 'connecting');
                photon.connect();
            } catch (e) {
                showError('Failed to initialize Photon: ' + e.message);
                updateStatus('Error', 'disconnected');
            }
        }

        function onPhotonConnect() {
            isConnected = true;
            updateStatus('Connected', 'connected');
            document.getElementById('joinBtn').disabled = false;
        }

        function onPhotonDisconnect() {
            isConnected = false;
            isInRoom = false;
            updateStatus('Disconnected', 'disconnected');
            document.getElementById('joinBtn').disabled = true;
            disableControls();
        }

        function onPhotonError(code, msg) {
            console.error('Photon Error:', code, msg);
            showError('Network Error: ' + msg);
        }

        function onPhotonEvent(event) {
            try {
                const code = event.code;
                const data = event.data;

                if (code === 1) {
                    if (data && data.state) {
                        const remoteState = JSON.parse(data.state);
                        syncRemoteState(remoteState);
                    }
                } else if (code === 2) {
                    updatePlayersList();
                }
            } catch (e) {
                console.error('Error handling event:', e);
            }
        }

        function joinGame() {
            const nameInput = document.getElementById('playerName');
            const roomSelect = document.getElementById('roomSelect');
            const name = nameInput.value.trim() || 'Player ' + Math.random().toString(36).substr(2, 5);
            myRoom = roomSelect.value;

            document.getElementById('joinBtn').disabled = true;

            const roomOptions = new Photon.LoadBalancing.RoomOptions();
            roomOptions.maxPlayers = 4;
            roomOptions.isOpen = true;
            roomOptions.isVisible = true;

            photon.joinRoom(myRoom, { rejoin: false, createIfNotExists: true }, roomOptions);

            myPlayerId = photon.myActor().actorNr;
            isInRoom = true;

            const colorMap = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A'];
            const playerCount = Object.keys(gameState.snakes).length;

            mySnake = {
                playerId: myPlayerId,
                body: [
                    {
                        x: Math.floor(Math.random() * (GRID_SIZE - 5)) + 2,
                        y: Math.floor(Math.random() * (GRID_SIZE - 5)) + 2
                    }
                ],
                direction: { x: 1, y: 0 },
                nextDirection: { x: 1, y: 0 },
                score: 0,
                alive: true,
                color: colorMap[playerCount % colorMap.length],
                name: name
            };

            gameState.snakes[myPlayerId] = mySnake;

            if (!gameState.food) {
                gameState.food = spawnFood();
            }

            document.getElementById('joinSection').style.display = 'none';
            document.getElementById('gameInfo').style.display = 'block';
            updateStatus('In Game', 'connected');
            enableControls();
            broadcastState();
            updatePlayersList();
        }

        function sendDirection(x, y) {
            if (!isInRoom || !mySnake || !mySnake.alive) return;

            const now = Date.now();
            if (now - lastDirectionSendTime < DIRECTION_THROTTLE) return;
            lastDirectionSendTime = now;

            if (x !== -mySnake.direction.x || y !== -mySnake.direction.y) {
                mySnake.nextDirection = { x, y };
                broadcastState();
            }
        }

        function broadcastState() {
            if (!isInRoom) return;
            const eventData = { state: JSON.stringify(gameState) };
            photon.raiseEvent(1, eventData, { receivers: Photon.LoadBalancing.ReceiverGroup.All });
        }

        function syncRemoteState(remoteState) {
            if (!remoteState || !remoteState.snakes) return;

            Object.keys(remoteState.snakes).forEach(playerId => {
                if (parseInt(playerId) !== myPlayerId) {
                    gameState.snakes[playerId] = remoteState.snakes[playerId];
                }
            });

            if (remoteState.food) {
                gameState.food = remoteState.food;
            }
        }

        function updateGameState() {
            if (!isInRoom || !mySnake) return;

            mySnake.direction = mySnake.nextDirection;
            const head = mySnake.body[0];
            const newHead = {
                x: (head.x + mySnake.direction.x + GRID_SIZE) % GRID_SIZE,
                y: (head.y + mySnake.direction.y + GRID_SIZE) % GRID_SIZE
            };

            for (let segment of mySnake.body) {
                if (newHead.x === segment.x && newHead.y === segment.y) {
                    mySnake.alive = false;
                    return;
                }
            }

            mySnake.body.unshift(newHead);

            if (gameState.food && newHead.x === gameState.food.x && newHead.y === gameState.food.y) {
                mySnake.score += 10;
                gameState.food = spawnFood();
            }

            for (let playerId in gameState.snakes) {
                if (parseInt(playerId) === myPlayerId) continue;
                const otherSnake = gameState.snakes[playerId];
                if (!otherSnake.alive) continue;

                for (let segment of otherSnake.body) {
                    if (newHead.x === segment.x && newHead.y === segment.y) {
                        mySnake.alive = false;
                        return;
                    }
                }
            }

            broadcastState();
        }

        function spawnFood() {
            let food;
            let validSpawn = false;

            while (!validSpawn) {
                food = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
                validSpawn = true;

                for (let snakeId in gameState.snakes) {
                    for (let segment of gameState.snakes[snakeId].body) {
                        if (food.x === segment.x && food.y === segment.y) {
                            validSpawn = false;
                            break;
                        }
                    }
                    if (!validSpawn) break;
                }
            }

            return food;
        }

        function updatePlayersList() {
            const list = document.getElementById('playersList');
            const scoresList = document.getElementById('scoresList');
            list.innerHTML = '';
            scoresList.innerHTML = '';

            for (let playerId in gameState.snakes) {
                const snake = gameState.snakes[playerId];
                const isYou = parseInt(playerId) === myPlayerId;

                const playerDiv = document.createElement('div');
                playerDiv.className = 'player-item';
                const statusText = snake.alive ? 'Alive' : 'Dead';
                playerDiv.innerHTML = `
                    <div>
                        <span class="player-color" style="background: ${snake.color}"></span>
                        ${snake.name} ${isYou ? '(You)' : ''}
                    </div>
                    <span>${statusText}</span>
                `;
                list.appendChild(playerDiv);

                const scoreDiv = document.createElement('div');
                scoreDiv.className = 'score-item';
                scoreDiv.innerHTML = `
                    <span style="color: ${snake.color}; font-weight: 600;">●</span>
                    <span>${snake.name} ${isYou ? '(You)' : ''}</span>
                    <span>${snake.score}</span>
                `;
                scoresList.appendChild(scoreDiv);
            }
        }

        function render() {
            ctx.fillStyle = '#0f0f1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GRID_SIZE; i++) {
                const pos = i * CELL_SIZE;
                ctx.beginPath();
                ctx.moveTo(pos, 0);
                ctx.lineTo(pos, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, pos);
                ctx.lineTo(canvas.width, pos);
                ctx.stroke();
            }

            if (gameState.food) {
                ctx.fillStyle = '#fbbf24';
                ctx.beginPath();
                ctx.arc(
                    gameState.food.x * CELL_SIZE + CELL_SIZE / 2,
                    gameState.food.y * CELL_SIZE + CELL_SIZE / 2,
                    CELL_SIZE / 2.5,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
            }

            for (let playerId in gameState.snakes) {
                const snake = gameState.snakes[playerId];

                snake.body.forEach((segment, index) => {
                    if (index === 0) {
                        ctx.fillStyle = snake.color;
                        ctx.fillRect(
                            segment.x * CELL_SIZE,
                            segment.y * CELL_SIZE,
                            CELL_SIZE,
                            CELL_SIZE
                        );
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(
                            segment.x * CELL_SIZE + CELL_SIZE * 0.7,
                            segment.y * CELL_SIZE + CELL_SIZE * 0.3,
                            CELL_SIZE * 0.15,
                            0,
                            Math.PI * 2
                        );
                        ctx.fill();
                    } else {
                        ctx.fillStyle = snake.color;
                        ctx.globalAlpha = 0.7 - (index / snake.body.length) * 0.3;
                        ctx.fillRect(
                            segment.x * CELL_SIZE,
                            segment.y * CELL_SIZE,
                            CELL_SIZE,
                            CELL_SIZE
                        );
                        ctx.globalAlpha = 1;
                    }
                });

                if (snake.body.length > 0 && snake.alive) {
                    const head = snake.body[0];
                    ctx.fillStyle = snake.color;
                    ctx.font = 'bold 12px system-ui';
                    ctx.textAlign = 'center';
                    ctx.fillText(
                        snake.score,
                        head.x * CELL_SIZE + CELL_SIZE / 2,
                        head.y * CELL_SIZE - 5
                    );
                }
            }
        }

        function setupKeyboardControls() {
            document.addEventListener('keydown', (e) => {
                switch (e.key.toLowerCase()) {
                    case 'arrowup':
                    case 'w':
                        e.preventDefault();
                        sendDirection(0, -1);
                        break;
                    case 'arrowdown':
                    case 's':
                        e.preventDefault();
                        sendDirection(0, 1);
                        break;
                    case 'arrowleft':
                    case 'a':
                        e.preventDefault();
                        sendDirection(-1, 0);
                        break;
                    case 'arrowright':
                    case 'd':
                        e.preventDefault();
                        sendDirection(1, 0);
                        break;
                }
            });
        }

        function setupTouchControls() {
            let touchStartX = 0;
            let touchStartY = 0;

            canvas.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });

            canvas.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;

                const dx = touchEndX - touchStartX;
                const dy = touchEndY - touchStartY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > 20) {
                    if (Math.abs(dx) > Math.abs(dy)) {
                        sendDirection(dx > 0 ? 1 : -1, 0);
                    } else {
                        sendDirection(0, dy > 0 ? 1 : -1);
                    }
                }
            });
        }

        function updateStatus(status, type = 'connecting') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = status;
            statusEl.className = 'connection-status ' + type;
        }

        function showError(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }

        function enableControls() {
            document.getElementById('upBtn').disabled = false;
            document.getElementById('downBtn').disabled = false;
            document.getElementById('leftBtn').disabled = false;
            document.getElementById('rightBtn').disabled = false;
        }

        function disableControls() {
            document.getElementById('upBtn').disabled = true;
            document.getElementById('downBtn').disabled = true;
            document.getElementById('leftBtn').disabled = true;
            document.getElementById('rightBtn').disabled = true;
        }

        setInterval(() => {
            if (isInRoom && mySnake && mySnake.alive) {
                updateGameState();
            }
            render();
        }, TICK_RATE);
    </script>
</body>
</html>
