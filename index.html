<!DOCTYPE html>
<html>
<head>
    <title>voidzcode</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family: "Segoe UI", monospace;
            background: radial-gradient(circle at top, #04170c 0%, #000 45%, #010101 100%);
            color: #eafff1;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(120deg, rgba(0,255,102,0.08), transparent 45%, rgba(0,255,102,0.04));
            pointer-events: none;
            z-index: -2;
            animation: drift 16s ease-in-out infinite alternate;
        }

        #matrix {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0.9;
        }

        .content {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            text-align: center;
            text-shadow: 0 0 15px rgba(0,255,102,0.35);
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 900ms ease, transform 900ms ease;
        }

        .content.ready {
            opacity: 1;
            transform: translateY(0);
        }

        h1 {
            font-size: clamp(2.8rem, 7vw, 4.6rem);
            color: #00ff66;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            animation: glow 2.4s ease-in-out infinite alternate;
        }

        .subtitle {
            margin-top: 0.8rem;
            font-size: clamp(1rem, 2.3vw, 1.2rem);
            color: rgba(234, 255, 241, 0.9);
            letter-spacing: 0.08em;
            opacity: 0.95;
        }

        #terminal-output {
            margin: 20px auto 0;
            max-width: 780px;
            min-height: 11.5em;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            font-size: clamp(1.05rem, 2.3vw, 1.45rem);
            line-height: 1.6;
            overflow: hidden;
        }

        .terminal-line {
            min-height: 1.6em;
            width: 100%;
            white-space: pre-wrap;
            opacity: 1;
            transform: translateY(8px);
            transition: transform 0.7s ease, opacity 0.7s ease;
        }

        .terminal-line.completed-line {
            opacity: 0.95;
            transform: translateY(0);
        }

        .terminal-line.scroll-up {
            transform: translateY(-1.4em);
            opacity: 0;
        }

        .cursor {
            display: inline-block;
            width: 0.6em;
            margin-left: 2px;
            border-right: 2px solid #00ff66;
            animation: blink 0.8s steps(1) infinite;
        }

        .hero-actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            margin-top: 1.2rem;
            min-height: 5.2rem;
        }

        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
        }

        .nav-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-family: inherit;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: #00ff66;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 255, 102, 0.65);
            border-radius: 999px;
            text-decoration: none;
            text-shadow: 0 0 10px rgba(0,255,102,0.45);
            box-shadow: 0 0 18px rgba(0,255,102,0.15);
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: all 500ms cubic-bezier(0.2, 0.9, 0.2, 1);
            backdrop-filter: blur(8px);
        }

        .nav-button.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
            animation: pulseGlow 2.2s ease-in-out infinite alternate;
        }

        .hero-actions .nav-button,
        .hero-actions .skip-button {
            transform: translateY(16px);
        }

        .hero-actions .nav-button.show,
        .hero-actions .skip-button.show {
            transform: translateY(0);
        }

        .nav-button:hover {
            background: #00ff66;
            color: black;
            box-shadow: 0 0 26px rgba(0,255,102,0.45);
            transform: translateY(-2px) scale(1.02);
        }

        .skip-button {
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: rgba(234, 255, 241, 0.85);
            background: transparent;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 250ms ease, transform 250ms ease;
        }

        .skip-button.show {
            opacity: 1;
            pointer-events: auto;
        }

        .skip-button.hide {
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
        }

        .skip-button:hover {
            transform: translateY(-1px);
            border-color: rgba(0, 255, 102, 0.45);
            color: #00ff66;
        }

        @keyframes blink {
            50% {
                border-color: transparent;
            }
        }

        @keyframes glow {
            from { text-shadow: 0 0 8px rgba(0,255,102,0.55); }
            to { text-shadow: 0 0 20px rgba(0,255,102,0.95); }
        }

        @keyframes pulseGlow {
            from { box-shadow: 0 0 8px rgba(0,255,102,0.2); }
            to { box-shadow: 0 0 24px rgba(0,255,102,0.45); }
        }

        @keyframes drift {
            from { transform: translate3d(-2%, -1%, 0); }
            to { transform: translate3d(2%, 1%, 0); }
        }

        @media (max-width: 640px) {
            .content {
                padding: 1.4rem 1rem;
            }

            #terminal-output {
                min-height: 13em;
            }
        }
    </style>
</head>


<body>

<canvas id="matrix"></canvas>


<div class="content" id="hero">
    <h1>voidzcode</h1>
    <div class="subtitle">my online portfolio</div>
    <div class="subtitle">made with love by voidz! <3</div>
    <div class="hero-actions">
        <button id="skip-button" class="skip-button" type="button">skip intro</button>
        <div id="nav-buttons" class="nav-buttons">
            <a id="games-button" class="nav-button" href="https://voidzcode.github.io/games" target="_self">games</a>
            <a id="tools-button" class="nav-button" href="https://voidzcode.github.io/tools" target="_self">tools</a>
            <a id="about-button" class="nav-button" href="https://voidzcode.github.io/about%20me" target="_self">about me</a>
        </div>
    </div>
    <div id="terminal-output"></div>
</div>



<script>


// TERMINAL BOOT

const terminalOutput = document.getElementById("terminal-output");

const terminalLines = [
    "granting access to the voidzcode repository...",
    "establishing secure connection...",
    "importing assets to page...",
    "initializing voidzcode engine...",
    "all tasks completed successfully!",
    "welcome to the void."
];


let activeLine = "";
let lineIndex = 0;
let charIndex = 0;
let currentLineEl = null;
let introActive = true;



function escapeHtml(text) {
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}



function renderCurrentLine() {

    if (!currentLineEl) {
        currentLineEl = document.createElement("div");
        currentLineEl.className = "terminal-line";
        terminalOutput.appendChild(currentLineEl);
    }


    currentLineEl.innerHTML =
        `${escapeHtml(activeLine)}<span class="cursor"></span>`;
}



function finalizeLine() {
    if (!currentLineEl) return;

    const line = currentLineEl;
    line.innerHTML = escapeHtml(activeLine);
    line.classList.add("completed-line");

    setTimeout(() => {
        line.classList.add("scroll-up");
    }, 900);

    setTimeout(() => {
        if (line && line.parentNode) {
            line.remove();
        }
    }, 1250);

    currentLineEl = null;
}



function showNavigation() {
    if (!introActive) return;

    const buttons = [
        document.getElementById("games-button"),
        document.getElementById("tools-button"),
        document.getElementById("about-button")
    ];

    buttons.forEach((button, index) => {
        setTimeout(() => {
            if (!introActive) return;
            button.classList.add("show");
        }, 900 + index * 180);
    });

    setTimeout(() => {
        if (!introActive) return;
        const skipButton = document.getElementById("skip-button");
        skipButton.classList.add("show");
        skipButton.classList.remove("hide");
    }, 1100);
}

function skipIntro() {
    introActive = false;
    const skipButton = document.getElementById("skip-button");
    const buttons = [
        document.getElementById("games-button"),
        document.getElementById("tools-button"),
        document.getElementById("about-button")
    ];

    buttons.forEach((button) => button.classList.add("show"));
    skipButton.classList.add("hide");
    skipButton.classList.remove("show");
    terminalOutput.style.transition = "opacity 400ms ease, transform 400ms ease";
    terminalOutput.style.opacity = "0";
    terminalOutput.style.transform = "translateY(-10px)";
    setTimeout(() => {
        terminalOutput.innerHTML = "";
        currentLineEl = null;
        activeLine = "";
        charIndex = 0;
        lineIndex = terminalLines.length;
    }, 220);
}

function typeTerminal() {
    if (!introActive) return;

    const currentLine = terminalLines[lineIndex];

    if (charIndex < currentLine.length) {
        activeLine += currentLine[charIndex];
        charIndex++;
        renderCurrentLine();
        setTimeout(() => {
            if (introActive) typeTerminal();
        }, 45);
        return;
    }

    finalizeLine();

    if (lineIndex === terminalLines.length - 1) {
        const skipButton = document.getElementById("skip-button");
        skipButton.classList.add("hide");
        skipButton.classList.remove("show");
        setTimeout(() => {
            if (!introActive) return;
            showNavigation();
        }, 280);
    }

    activeLine = "";
    charIndex = 0;
    lineIndex++;

    if (lineIndex < terminalLines.length) {
        setTimeout(() => {
            if (!introActive) return;
            renderCurrentLine();
            setTimeout(() => {
                if (introActive) typeTerminal();
            }, 500);
        }, 700);
    }
}



window.onload = () => {
    document.getElementById("hero").classList.add("ready");
    document.getElementById("skip-button").classList.add("show");
    setTimeout(typeTerminal, 700);
};

document.getElementById("skip-button").addEventListener("click", skipIntro);





// MATRIX BACKGROUND


const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

let viewWidth = window.innerWidth;
let viewHeight = window.innerHeight;

function resize() {
    const dpr = window.devicePixelRatio || 1;
    viewWidth = window.innerWidth;
    viewHeight = window.innerHeight;

    canvas.width = Math.floor(viewWidth * dpr);
    canvas.height = Math.floor(viewHeight * dpr);
    canvas.style.width = viewWidth + "px";
    canvas.style.height = viewHeight + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

resize();

const characters = "VOIDZCODE01<>[]{}$#@ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 18;
let columns;
let drops = [];

function setupMatrix() {
    columns = Math.max(1, Math.floor(viewWidth / fontSize));
    drops = [];

    for (let i = 0; i < columns; i++) {
        drops[i] = Math.random() * (viewHeight / fontSize);
    }
}

setupMatrix();

function drawMatrix() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
    ctx.fillRect(0, 0, viewWidth, viewHeight);

    ctx.font = fontSize + "px monospace";
    ctx.fillStyle = "#00ff66";
    ctx.textBaseline = "top";

    for (let i = 0; i < drops.length; i++) {
        const char = characters[Math.floor(Math.random() * characters.length)];
        ctx.fillText(char, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > viewHeight && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i]++;
    }

    requestAnimationFrame(drawMatrix);
}

drawMatrix();

window.addEventListener("resize", () => {
    resize();
    setupMatrix();
});


</script>


</body>
</html>
