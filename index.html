<!DOCTYPE html>
<html>
<head>
    <title>voidzcode</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            overflow: hidden;
            font-family: monospace;
        }

        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        .content {
            color: white;
            text-align: center;
            margin-top: 25vh;
            text-shadow: 0 0 15px #00ff66;
        }

        h1 {
            font-size: 70px;
            color: #00ff66;
        }

        #terminal-output {
            margin: 20px auto 0;
            max-width: 780px;
            min-height: 11.5em;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            font-size: 25px;
            line-height: 1.6;
            overflow: hidden;
        }

        .terminal-line {
            min-height: 1.6em;
            width: 100%;
            white-space: pre-wrap;
            opacity: 1;
            transition: transform 0.7s ease, opacity 0.7s ease;
        }

        .terminal-line.completed-line {
            opacity: 0.95;
        }

        .terminal-line.scroll-up {
            transform: translateY(-1.4em);
            opacity: 0;
        }

        .cursor {
            display: inline-block;
            width: 0.6em;
            margin-left: 2px;
            border-right: 2px solid #00ff66;
            animation: blink 0.8s steps(1) infinite;
        }

        @keyframes blink {
            50% {
                border-color: transparent;
            }
        }


        /* GAME BUTTON */

        .game-button {
            display: inline-block;
            margin-top: 35px;
            padding: 15px 35px;

            font-size: 25px;
            font-family: monospace;

            color: #00ff66;
            background: rgba(0,0,0,0.7);

            border: 2px solid #00ff66;
            text-decoration: none;

            text-shadow: 0 0 10px #00ff66;
            box-shadow: 0 0 15px #00ff66;

            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);

            transition: 1s ease;
        }


        .game-button.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }


        .game-button:hover {
            background: #00ff66;
            color: black;
            box-shadow: 0 0 30px #00ff66;
        }

    </style>
</head>


<body>

<canvas id="matrix"></canvas>


<div class="content">

    <h1>voidzcode</h1>

    <div id="terminal-output"></div>


    <a id="snake-button" class="game-button" href="games/snake/">
        🐍 PLAY SNAKE
    </a>

</div>



<script>


// TERMINAL BOOT

const terminalOutput = document.getElementById("terminal-output");

const terminalLines = [
    "sudo grant access to the voidzcode repository.",
    "ACCESS GRANTED.",
    "running voidzcode.",
    "initialization complete.",
    "detecting user.",
    "detected user: anonymous.",
    "running voidzcode access protocol.",
    "all tasks completed successfully!",
    "terminating terminal session.",
    "welcome to the void."
];


let activeLine = "";
let lineIndex = 0;
let charIndex = 0;
let currentLineEl = null;



function escapeHtml(text) {
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}



function renderCurrentLine() {

    if (!currentLineEl) {
        currentLineEl = document.createElement("div");
        currentLineEl.className = "terminal-line";
        terminalOutput.appendChild(currentLineEl);
    }


    currentLineEl.innerHTML =
        `${escapeHtml(activeLine)}<span class="cursor"></span>`;
}



function finalizeLine() {

    if (!currentLineEl) return;


    currentLineEl.innerHTML =
        escapeHtml(activeLine);


    currentLineEl.classList.add("completed-line");


    currentLineEl = null;
}



function showGames() {

    setTimeout(() => {

        document
        .getElementById("snake-button")
        .classList.add("show");

    }, 1000);

}



function typeTerminal() {


    const currentLine = terminalLines[lineIndex];


    if (charIndex < currentLine.length) {


        activeLine += currentLine[charIndex];

        charIndex++;

        renderCurrentLine();


        setTimeout(typeTerminal, 45);

        return;

    }



    finalizeLine();



    if (lineIndex === terminalLines.length - 1) {

        showGames();

    }



    activeLine = "";

    charIndex = 0;

    lineIndex++;



    if (lineIndex < terminalLines.length) {


        setTimeout(() => {

            renderCurrentLine();

            setTimeout(typeTerminal, 500);

        }, 250);

    }

}



window.onload = () => {

    setTimeout(typeTerminal, 700);

};





// MATRIX BACKGROUND


const canvas = document.getElementById("matrix");

const ctx = canvas.getContext("2d");


function resize() {

    canvas.width = window.innerWidth;

    canvas.height = window.innerHeight;

}


resize();


const characters =
"VOIDZCODE01<>[]{}$#@ABCDEFGHIJKLMNOPQRSTUVWXYZ";


const fontSize = 18;


let columns;

let drops = [];



function setupMatrix() {

    columns = Math.floor(canvas.width / fontSize);

    drops = [];


    for (let i = 0; i < columns; i++) {

        drops[i] =
        Math.random() * canvas.height / fontSize;

    }

}



setupMatrix();



function drawMatrix() {


    ctx.fillStyle =
    "rgba(0,0,0,0.08)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );



		ctx.font = fontSize + "px monospace";

		ctx.fillStyle = "#00ff66";
		ctx.textBaseline = 'top';



    for (let i = 0; i < drops.length; i++) {


        const char =
        characters[
            Math.floor(
                Math.random() * characters.length
            )
        ];



        ctx.fillText(
            char,
            i * fontSize,
            drops[i] * fontSize
        );



        if (
            drops[i] * fontSize > canvas.height
            &&
            Math.random() > 0.975
        ) {

            drops[i] = 0;

        }


        drops[i]++;

    }



    requestAnimationFrame(drawMatrix);

}



drawMatrix();



window.addEventListener("resize", () => {

    resize();

    setupMatrix();

});


</script>


</body>
</html>
